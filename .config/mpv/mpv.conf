# --- General ---
keep-open=yes
save-position-on-quit=yes
autofit-larger=90%x90%

# --- UI ---
osc=auto
osd-bar=no
border=no

# --- Video / Wayland ---
vo=gpu
gpu-context=wayland

# --- Hardware Decoding ---
hwdec=vaapi
vaapi-device=/dev/dri/renderD128

# --- Quality ---
scale=spline36
cscale=spline36
dscale=mitchell
correct-downscaling=yes
linear-downscaling=yes
dither-depth=auto

# --- Screenshots ---
screenshot-format=png
screenshot-directory=~/Pictures/Screenshots

# --- Thumbfast Worker Profile ---
[thumbfast]
network=no
audio=no
sub=no
video=no
hwdec=no
profile=fast
